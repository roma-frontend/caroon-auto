<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F6CBD"/>
      <stop offset="100%" style="stop-color:#0A4D8C"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E8F0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#FFFFFF" stroke-width="6"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Car icon -->
  <g transform="translate(256,230)">
    <!-- Car body -->
    <rect x="-80" y="-10" width="160" height="60" rx="12" fill="url(#car)"/>
    <!-- Roof -->
    <path d="M-40,-10 L-20,-40 L20,-40 L45,-10" fill="url(#car)" stroke="none"/>
    <!-- Windows -->
    <path d="M-35,-10 L-18,-35 L-5,-35 L-5,-10 Z" fill="#0F6CBD" opacity="0.3"/>
    <path d="M5,-10 L5,-35 L18,-35 L35,-10 Z" fill="#0F6CBD" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="-45" cy="55" r="22" fill="#1A1A2E" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="-45" cy="55" r="8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="45" cy="55" r="22" fill="#1A1A2E" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="45" cy="55" r="8" fill="#FFFFFF" opacity="0.8"/>
    <!-- Headlight -->
    <rect x="78" y="5" width="8" height="14" rx="3" fill="#FFD700"/>
    <rect x="-86" y="5" width="8" height="14" rx="3" fill="#FF6B6B"/>
    <!-- Line detail -->
    <line x1="-75" y1="20" x2="75" y2="20" stroke="#0F6CBD" stroke-opacity="0.2" stroke-width="1.5"/>
  </g>

  <!-- AutoParts text -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" letter-spacing="4">AUTOPARTS</text>
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="16" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="6">AUTO PARTS</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="440" r="4" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="100" cy="445" r="2.5" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="432" cy="440" r="4" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="412" cy="445" r="2.5" fill="#FFFFFF" opacity="0.2"/>

  <!-- Armenian flag hint -->
  <rect x="196" y="362" width="120" height="2" rx="1" fill="#FFFFFF" opacity="0.15"/>
</svg>
