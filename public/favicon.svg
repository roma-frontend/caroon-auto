  <rect x="15" y="24" width="2" height="3" rx="1" fill="white"/>
  <rect x="5" y="15" width="3" height="2" rx="1" fill="white"/>
  <rect x="24" y="15" width="3" height="2" rx="1" fill="white"/>
  <rect x="7.5" y="7.5" width="2" height="3" rx="1" fill="white" transform="rotate(45 8.5 9)"/>
  <rect x="21.5" y="21.5" width="2" height="3" rx="1" fill="white" transform="rotate(45 22.5 23)"/>
  <rect x="7.5" y="21.5" width="2" height="3" rx="1" fill="white" transform="rotate(-45 8.5 23)"/>
